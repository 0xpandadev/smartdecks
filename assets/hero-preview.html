<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1600px;
      height: 1000px;
      overflow: hidden;
      background: #eef2f8;
      font-family: Inter, Arial, sans-serif;
    }
    .stage {
      position: relative;
      width: 1600px;
      height: 1000px;
      padding: 58px 76px;
      background:
        linear-gradient(90deg, rgba(36, 88, 255, .08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(36, 88, 255, .06) 1px, transparent 1px),
        #f6f8fc;
      background-size: 38px 38px;
    }
    .rail {
      position: absolute;
      left: 76px;
      right: 76px;
      top: 54px;
      display: flex;
      justify-content: space-between;
      color: #283142;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
    .shot {
      position: absolute;
      overflow: hidden;
      border: 2px solid #1a2030;
      border-radius: 14px;
      background: white;
      box-shadow: 18px 22px 0 rgba(16, 18, 24, .12);
    }
    .shot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top center;
      display: block;
    }
    .a { left: 82px; top: 128px; width: 720px; height: 470px; }
    .b { right: 86px; top: 108px; width: 560px; height: 360px; }
    .c { right: 186px; bottom: 90px; width: 560px; height: 340px; }
    .d { left: 202px; bottom: 64px; width: 480px; height: 280px; }
    .badge {
      position: absolute;
      left: 96px;
      bottom: 96px;
      padding: 16px 20px;
      border: 2px solid #1a2030;
      border-radius: 999px;
      background: #b7ff3c;
      color: #101218;
      font-size: 18px;
      font-weight: 950;
      box-shadow: 8px 8px 0 rgba(16, 18, 24, .16);
    }
  </style>
</head>
<body>
  <main class="stage">
    <div class="rail"><span>SmartDecks</span><span>12 numbered design systems</span></div>
    <figure class="shot a"><img src="../samples/executive-analytical-minimalism.png" alt=""></figure>
    <figure class="shot b"><img src="../samples/soft-modular-neo-brutalism.png" alt=""></figure>
    <figure class="shot c"><img src="../samples/pastel-neo-brutalism.png" alt=""></figure>
    <figure class="shot d"><img src="../samples/analog-editorial-collage.png" alt=""></figure>
    <div class="badge">HTML slides / PPTX-ready planning / Visual QA</div>
  </main>
</body>
</html>
